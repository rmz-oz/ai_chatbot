<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACU LightRAG Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
  header { background: #1a1a2e; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1rem; font-weight: 600; }
  header span { font-size: .75rem; background: #e2b714; color: #000; padding: 2px 8px; border-radius: 99px; font-weight: 700; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 72%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: .92rem; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot  { align-self: flex-start; background: #fff; color: #222; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .msg.bot.thinking { color: #999; font-style: italic; }
  footer { background: #fff; border-top: 1px solid #e0e0e0; padding: 12px 16px; display: flex; gap: 8px; align-items: center; }
  #mode-select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: .85rem; background: #f8f8f8; }
  #input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: .92rem; outline: none; }
  #input:focus { border-color: #1a1a2e; }
  #send-btn { padding: 10px 18px; background: #1a1a2e; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: .92rem; }
  #send-btn:disabled { opacity: .5; cursor: not-allowed; }
  .mode-badge { font-size: .7rem; background: #eee; padding: 1px 6px; border-radius: 4px; margin-left: 6px; color: #666; }
</style>
</head>
<body>
<header>
  <h1>ACU LightRAG Demo</h1>
  <span>EXPERIMENTAL</span>
</header>

<div id="messages">
  <div class="msg bot">Merhaba! LightRAG demo chatbotu. Sağ alttaki moddan retrieval tipini seçebilirsin.<br><br>
  <strong>naive</strong> — basit vector<br>
  <strong>local</strong> — entity graph<br>
  <strong>global</strong> — community graph<br>
  <strong>hybrid</strong> — local + global (önerilen)</div>
</div>

<footer>
  <select id="mode-select">
    <option value="hybrid" selected>hybrid</option>
    <option value="local">local</option>
    <option value="global">global</option>
    <option value="naive">naive</option>
  </select>
  <input id="input" type="text" placeholder="Soru sor..." autocomplete="off">
  <button id="send-btn">Gönder</button>
</footer>

<script>
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send-btn');
const modeSelect = document.getElementById('mode-select');

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function send() {
  const q = inputEl.value.trim();
  if (!q) return;
  const mode = modeSelect.value;

  addMsg(q, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;

  const botDiv = addMsg('Düşünüyor…', 'bot thinking');

  try {
    const resp = await fetch('/api/stream/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, mode }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let answer = '';
    botDiv.className = 'msg bot';
    botDiv.textContent = '';

    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.token) { answer += data.token; botDiv.textContent = answer; messagesEl.scrollTop = messagesEl.scrollHeight; }
        if (data.done) break;
      }
    }

    const badge = document.createElement('span');
    badge.className = 'mode-badge';
    badge.textContent = mode;
    botDiv.appendChild(badge);

  } catch (e) {
    botDiv.className = 'msg bot';
    botDiv.textContent = 'Hata: ' + e.message;
  }
  sendBtn.disabled = false;
  inputEl.focus();
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
